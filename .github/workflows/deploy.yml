name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Sync to Hugging Face Spaces
        uses: huggingface/hub-sync@main
        with:
          # 💡 تم تحديث المسميات هنا لتتوافق مع التحديث الأخير للأداة
          huggingface_repo_id: Hamid2us/PDF-RAG
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
