name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Sync to Hugging Face Spaces
        uses: huggingface/hub-sync@main # 💡 تم التحديث إلى الفرع الرئيسي المستقر للأداة
        with:
          repo_id: Hamid2us/PDF-RAG
          repo_type: space
          token: ${{ secrets.HF_TOKEN }}
