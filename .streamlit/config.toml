# =============================================================================
# config.toml
# =============================================================================
# هذا الملف يتحكم في إعدادات واجهة Streamlit
# عند تشغيل المشروع على Hugging Face Spaces أو محليًا
# =============================================================================

[theme]

# لون الخلفية الأساسي للتطبيق
base="light"

# اللون الأساسي للعناصر (أزرار، روابط، إلخ)
primaryColor="#4CAF50"

# لون الخلفية الثانوية (Sidebar)
backgroundColor="#FFFFFF"

# لون النص
textColor="#000000"

# نوع الخط
font="sans serif"

# =============================================================================
# إعدادات عامة
# =============================================================================

[server]

# منع إعادة تشغيل غير ضرورية
runOnSave = false

# تحسين الأداء
headless = true

# السماح بالوصول من الخارج (مهم لـ Hugging Face)
enableCORS = false
enableXsrfProtection = false
